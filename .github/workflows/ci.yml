name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    name: Backend (Node + Jest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: doctor_barbearia_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:admin123@localhost:5432/doctor_barbearia_test
      JWT_SECRET: test-secret-32-chars-long-for-jest-runs
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: test
      SKIP_CRON: 1

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar deps
        working-directory: backend
        run: npm ci

      - name: Rodar seed
        run: psql "postgres://postgres:admin123@localhost:5432/doctor_barbearia_test" -f db/seed.sql || true

      - name: Lint
        working-directory: backend
        run: npm run lint --if-present || true

      - name: Testes
        working-directory: backend
        run: npm test

      - name: Cobertura
        working-directory: backend
        if: success()
        run: npm run test:coverage

  frontend:
    name: Frontend (React + Jest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar deps
        working-directory: frontend
        run: npm ci

      - name: Testes
        working-directory: frontend
        run: CI=true npm test

      - name: Build
        working-directory: frontend
        if: success()
        run: CI=true npm run build
        env:
          CI: true
          REACT_APP_API_URL: http://localhost:3001

  docker:
    name: Docker build (validação)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: doctor-barbearia-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: doctor-barbearia-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
