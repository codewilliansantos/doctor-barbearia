name: Backup DB

on:
  schedule:
    # Roda todo dia às 3h da manhã UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar deps
        working-directory: backend
        run: npm ci

      - name: Gerar backup
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node export_full.js

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup
          path: db/backup_full.sql
          retention-days: 30
