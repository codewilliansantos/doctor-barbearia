version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-doctor_barbearia}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Auto-executa seed na primeira vez
      - ./db/seed.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/${POSTGRES_DB:-doctor_barbearia}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      NODE_ENV: production
      ZAPI_INSTANCE: ${ZAPI_INSTANCE:-}
      ZAPI_TOKEN: ${ZAPI_TOKEN:-}
      ZAPI_CLIENT_TOKEN: ${ZAPI_CLIENT_TOKEN:-}
      PAGSEGURO_TOKEN: ${PAGSEGURO_TOKEN:-}
      PAGSEGURO_EMAIL: ${PAGSEGURO_EMAIL:-}
      ASAAS_ENV: ${ASAAS_ENV:-sandbox}
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:-}
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
